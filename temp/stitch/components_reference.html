<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Componentes Básicos: Botones e Inputs (V1)</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-slate-200 dark:border-b-slate-700 bg-white dark:bg-slate-900 px-10 py-3">
<div class="flex items-center gap-4">
<div class="size-6 text-primary">
<span class="material-symbols-outlined">dashboard</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight">ERP Sistema</h2>
</div>
</header>
<div class="px-4 md:px-10 lg:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[960px] flex-1 bg-white dark:bg-slate-900 shadow-sm rounded-lg border border-slate-200 dark:border-slate-800 p-6">
<div class="flex flex-wrap justify-between gap-3 mb-8 border-b border-slate-200 dark:border-slate-700 pb-4">
<p class="tracking-tight text-3xl font-bold leading-tight">Componentes Básicos: Botones e Inputs (V1)</p>
</div>
<h2 class="text-xl font-bold leading-tight tracking-tight pb-3 pt-5 border-b border-slate-100 dark:border-slate-800">Botones</h2>
<div class="flex flex-wrap gap-4 py-4 mb-6">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded h-10 px-4 bg-primary text-white text-sm font-semibold hover:bg-primary/90 transition-colors">
<span>Primario</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded h-10 px-4 bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-100 text-sm font-semibold hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors">
<span>Secundario</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded h-10 px-4 bg-transparent border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span>Esquema</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded h-10 px-4 bg-transparent text-primary text-sm font-semibold hover:bg-primary/10 transition-colors">
<span>Fantasma</span>
</button>
</div>
<h2 class="text-xl font-bold leading-tight tracking-tight pb-3 pt-5 border-b border-slate-100 dark:border-slate-800">Campos de Entrada</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 py-4">
<!-- Text Input -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Nombre Completo</label>
<input class="flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 p-2 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow text-sm" placeholder="Ej. Juan Pérez" type="text"/>
<span class="text-xs text-slate-500 dark:text-slate-400">Ingrese su nombre tal como aparece en su documento.</span>
</div>
<!-- Email Input with Icon -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Correo Electrónico</label>
<div class="relative flex w-full">
<span class="material-symbols-outlined absolute left-2 top-1/2 -translate-y-1/2 text-slate-400 text-sm">mail</span>
<input class="flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 p-2 pl-8 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow text-sm" placeholder="usuario@empresa.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Contraseña</label>
<input class="flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 p-2 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-shadow text-sm" type="password" value="password123"/>
</div>
<!-- Disabled Input -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-400 dark:text-slate-500">ID de Usuario (Solo lectura)</label>
<input class="flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 p-2 text-slate-400 dark:text-slate-500 cursor-not-allowed text-sm" disabled="" type="text" value="US-98234"/>
</div>
</div>
<h2 class="text-xl font-bold leading-tight tracking-tight pb-3 pt-5 border-b border-slate-100 dark:border-slate-800">Selección</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 py-4">
<!-- Checkboxes -->
<div class="flex flex-col gap-3">
<p class="text-sm font-medium text-slate-700 dark:text-slate-300">Permisos de Sistema</p>
<label class="flex items-center gap-2 cursor-pointer">
<input checked="" class="rounded border-slate-300 text-primary focus:ring-primary w-4 h-4" type="checkbox"/>
<span class="text-sm text-slate-800 dark:text-slate-200">Lectura de datos</span>
</label>
<label class="flex items-center gap-2 cursor-pointer">
<input class="rounded border-slate-300 text-primary focus:ring-primary w-4 h-4" type="checkbox"/>
<span class="text-sm text-slate-800 dark:text-slate-200">Escritura de datos</span>
</label>
<label class="flex items-center gap-2 cursor-pointer opacity-50">
<input checked="" class="rounded border-slate-300 text-primary focus:ring-primary w-4 h-4" disabled="" type="checkbox"/>
<span class="text-sm text-slate-800 dark:text-slate-200">Acceso básico (Obligatorio)</span>
</label>
</div>
<!-- Radio Buttons -->
<div class="flex flex-col gap-3">
<p class="text-sm font-medium text-slate-700 dark:text-slate-300">Tema Preferido</p>
<label class="flex items-center gap-2 cursor-pointer">
<input checked="" class="border-slate-300 text-primary focus:ring-primary w-4 h-4" name="theme" type="radio"/>
<span class="text-sm text-slate-800 dark:text-slate-200">Claro</span>
</label>
<label class="flex items-center gap-2 cursor-pointer">
<input class="border-slate-300 text-primary focus:ring-primary w-4 h-4" name="theme" type="radio"/>
<span class="text-sm text-slate-800 dark:text-slate-200">Oscuro</span>
</label>
<label class="flex items-center gap-2 cursor-pointer">
<input class="border-slate-300 text-primary focus:ring-primary w-4 h-4" name="theme" type="radio"/>
<span class="text-sm text-slate-800 dark:text-slate-200">Sistema</span>
</label>
</div>
</div>
</div>
</div>
</div>
</div>
</body></html>
