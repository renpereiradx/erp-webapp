<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-gradient)" stroke="#ffffff" stroke-width="8"/>
  
  <!-- ERP Icon - Building/Office -->
  <g fill="url(#icon-gradient)">
    <!-- Main building -->
    <rect x="180" y="140" width="152" height="220" rx="8" fill="url(#icon-gradient)"/>
    
    <!-- Roof -->
    <polygon points="170,140 256,100 342,140" fill="url(#icon-gradient)"/>
    
    <!-- Windows - Row 1 -->
    <rect x="200" y="170" width="20" height="20" rx="2" fill="#667eea" opacity="0.7"/>
    <rect x="240" y="170" width="20" height="20" rx="2" fill="#667eea" opacity="0.7"/>
    <rect x="280" y="170" width="20" height="20" rx="2" fill="#667eea" opacity="0.7"/>
    
    <!-- Windows - Row 2 -->
    <rect x="200" y="210" width="20" height="20" rx="2" fill="#667eea" opacity="0.7"/>
    <rect x="240" y="210" width="20" height="20" rx="2" fill="#667eea" opacity="0.7"/>
    <rect x="280" y="210" width="20" height="20" rx="2" fill="#667eea" opacity="0.7"/>
    
    <!-- Windows - Row 3 -->
    <rect x="200" y="250" width="20" height="20" rx="2" fill="#667eea" opacity="0.7"/>
    <rect x="240" y="250" width="20" height="20" rx="2" fill="#667eea" opacity="0.7"/>
    <rect x="280" y="250" width="20" height="20" rx="2" fill="#667eea" opacity="0.7"/>
    
    <!-- Door -->
    <rect x="240" y="310" width="32" height="50" rx="16" fill="#667eea"/>
    
    <!-- ERP Text -->
    <text x="256" y="400" text-anchor="middle" fill="url(#icon-gradient)" font-family="Arial, sans-serif" font-weight="bold" font-size="24">ERP</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="120" cy="380" r="8" fill="#ffffff" opacity="0.3"/>
  <circle cx="390" cy="200" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="400" cy="350" r="4" fill="#ffffff" opacity="0.3"/>
</svg>
