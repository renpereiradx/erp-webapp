# Wave 8: Enterprise Kubernetes ConfigMap
# Configuration for ERP WebApp

apiVersion: v1
kind: ConfigMap
metadata:
  name: erp-webapp-config
  namespace: erp-webapp
  labels:
    app: erp-webapp
    component: config
data:
  # Environment variables
  NODE_ENV: "production"
  VITE_APP_VERSION: "1.0.0"
  VITE_API_URL: "https://api.erp.company.com"
  
  # Nginx configuration
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;
    
    events {
        worker_connections 1024;
        use epoll;
        multi_accept on;
    }
    
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
        
        access_log /var/log/nginx/access.log main;
        
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        server_tokens off;
        
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/json
            application/javascript
            application/xml+rss
            application/atom+xml
            image/svg+xml;
        
        include /etc/nginx/conf.d/*.conf;
    }

---
apiVersion: v1
kind: Secret
metadata:
  name: erp-webapp-secrets
  namespace: erp-webapp
  labels:
    app: erp-webapp
    component: secrets
type: Opaque
stringData:
  # Database credentials (for future use)
  DB_PASSWORD: "changeme123"
  REDIS_PASSWORD: "changeme123"
  JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
  
  # API Keys (for external services)
  ANALYTICS_API_KEY: "your-analytics-api-key"
  MONITORING_API_KEY: "your-monitoring-api-key"
